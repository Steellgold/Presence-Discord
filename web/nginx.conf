server {
    listen ${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        font/woff2;

    # ── Cache headers ────────────────────────────────────────────────────────
    location ~* \.(css|js|svg|png|jpg|jpeg|webp|ico|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SPA fallback ─────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options SAMEORIGIN;
    }

    # ── Healthcheck (utilisé par Railway) ────────────────────────────────────
    location /health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # ── Sécurité : masquer la version nginx ──────────────────────────────────
    server_tokens off;

    # ── Logs minimalistes ────────────────────────────────────────────────────
    error_log /var/log/nginx/error.log warn;
    access_log off;
}
